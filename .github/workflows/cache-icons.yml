name: Cache External Icons Refresh

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  update-icons:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: 'write' # Needed for checkout, commit, and push

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main 
          # Use the token generated by the step above
          token: ${{ steps.app-token.outputs.token }} 

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm install

      - name: Run Icon Cache Script
        run: npm run download-icons

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add icons/

          # Only commit and push if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to icons detected in icons/. Skipping commit."
          else
            git commit -m "🤖 Auto-update: Refresh cached external icons"
            git push origin main
          fi
