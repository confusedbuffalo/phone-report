name: Cache External Icons Refresh

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write 
  pull-requests: write

jobs:
  update-icons:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: 'write' # Needed for checkout, commit, and push

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main 
          # Use the token generated by the step above
          token: ${{ steps.app-token.outputs.token }} 

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm install

      - name: Run Icon Cache Script
        run: npm run download-icons

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: '🤖 Auto-update: Refresh cached external icons'
          title: 'Update: Latest external icons cache'
          body: |
            This is an automated pull request to update the local cache of external icons.

            Please review and merge.
          branch: feat/icon-cache-update
          base: main
          delete-branch: true
