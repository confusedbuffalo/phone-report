name: Build and Deploy OSM Report

on:
  pull_request:
    branches:
      - main
  schedule:
    # Run at midnight (00:00) UTC every day
    - cron: '0 0 * * *'
  # Allow for manual trigger
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # Needed to commit updated history
  pages: write
  id-token: write
  pull-requests: write # Needed to post comments
  actions: read # Needed to list artifacts
  issues: write # Needed to make issues 

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm install

      - name: Run all tests
        run: npm test

  build-report:
    needs: run-tests
    runs-on: ubuntu-latest

    # Don't run on PRs for now, first file is large to download
    if: github.event_name != 'pull_request'

    outputs:
      is-full-build: ${{ env.BUILD_TYPE == 'full' }}

    env:
      BUILD_TYPE: ${{ (github.event_name == 'pull_request' || github.event_name == 'push') && 'simplified' || 'full' }}

    steps:
      - name: Generate GitHub App Token
        if: env.BUILD_TYPE == 'full'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: 'write'

      - name: Checkout repository (using App Token)
        if: env.BUILD_TYPE == 'full'
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Checkout repository (without App token)
        if: env.BUILD_TYPE == 'simplified'
        uses: actions/checkout@v5

      - name: Install Osmium Tool
        run: |
          sudo apt-get update
          sudo apt-get install -y osmium-tool

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Install Dependencies
        run: npm install

      - name: Run Full Build Process
        run: npm run build

      - name: Upload Phone History Data Artifact
        if: env.BUILD_TYPE == 'full'
        uses: actions/upload-artifact@v7
        with:
          name: new-history-phone-data
          path: history_phone/

      - name: Upload Name History Data Artifact
        if: env.BUILD_TYPE == 'full'
        uses: actions/upload-artifact@v7
        with:
          name: new-history-name-data
          path: history_name/

      - name: Upload Safe Edits Artifact
        if: env.BUILD_TYPE == 'full'
        uses: actions/upload-artifact@v7
        with:
          name: safe-edits-data
          path: safe_edits/

      - name: Run HTML Minifier
        if: env.BUILD_TYPE == 'full'
        run: |
          find public names_build -name "*.html" -print0 | while IFS= read -r -d $'\0' file; do
            npx html-minifier-terser "$file" --output "$file" --collapse-whitespace --remove-comments --minify-css true --minify-js true
          done
        shell: bash

      - name: Run JS Minifier (terser)
        if: env.BUILD_TYPE == 'full'
        run: |
          find public names_build -name "*.js" -print0 | while IFS= read -r -d $'\0' file; do
            npx terser "$file" --output "$file" --compress --mangle
          done
        shell: bash

      - name: Upload Names Pages Artifact
        uses: actions/upload-artifact@v7
        with:
          name: names-build
          path: names_build/

      - name: Deploy names to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN_NAMES }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_NAMES }}
          command: pages deploy names_build --project-name=names-report
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        if: env.BUILD_TYPE == 'full'
        id: deployment
        uses: actions/deploy-pages@v5

  bot-edit:
    needs: build-report
    if: needs.build-report.outputs.is-full-build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download safe edits artifact
        uses: actions/download-artifact@v8
        with:
          name: safe-edits-data
          path: safe_edits

      - name: Install Dependencies
        run: npm install

      - name: Run the bot process
        id: bot_process_run
        env:
          BOT_AUTH_TOKEN: ${{ secrets.BOT_AUTH_TOKEN }}
        run: npm run bot:autofix
        continue-on-error: true

      - name: Create GitHub Issue on Bot Failure
        uses: dacbd/create-issue-action@main
        if: always() && steps.bot_process_run.outcome == 'failure'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "🚨 Bot Edit Process Failed" 
          body: |
            ## Automated Edit Failure Notification
            The step **'Run the bot process'** failed during the workflow run 
            [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            The job was configured to **continue-on-error**, but this failure requires review as changes to OSM may not have been applied.

            - **Commit**: `${{ github.sha }}`

          labels: bot-failure
          assignees: confusedbuffalo

  push-history:
    needs: build-report
    if: needs.build-report.outputs.is-full-build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download phone history artifact
        uses: actions/download-artifact@v8
        with:
          name: new-history-phone-data
          path: /tmp/new_history_phone

      - name: Download name history artifact
        uses: actions/download-artifact@v8
        with:
          name: new-history-name-data
          path: /tmp/new_history_name

      - name: Generate GitHub App Token for Push
        id: app-token-push
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: 'write'

      - name: Checkout Main Branch
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token-push.outputs.token }}
          ref: main

      - name: Commit and Push History Data
        run: |
          # Configure Git user
          git config user.name "Auto-Pusher-Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Copy the downloaded history data into the repository's history folder
          mkdir -p history_phone && mkdir -p history_name
          cp -r /tmp/new_history_phone/* history_phone/
          cp -r /tmp/new_history_name/* history_name/
          echo "Restored new history data onto main branch working tree."
          
          git add history_phone history_name || true
          
          # Check if there are any changes to commit
          if git diff --cached --exit-code; then
              echo "No changes to history data. Skipping commit."
          else
              # Commit the changes. [skip ci] prevents an infinite loop of new workflow runs.
              git commit -m "🤖 History Data Update: $(date +%Y-%m-%d) [skip ci]"
              
              git push
          fi
